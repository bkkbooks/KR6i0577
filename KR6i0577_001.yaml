body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯如是我聞一時世尊在憍睒彌國瞿師羅林中爾時有大尊者名曰尊那來詣佛所到已致敬頭面禮足住立一面而白佛言世尊無盡功德還可得不唯願世尊為我敷演爾時世尊告大尊者尊那言善哉善哉汝能問於如來無盡功德汝今諦聽當為汝説尊那此無盡功德甚深微妙名稱普聞若人歸心獲大果報而此功德乃有七種名聞普遍甚深廣大若善男子善女人發至誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量何等為七尊那若有善男子善女人發大信心布施園林池沼充四方衆僧經行遊止尊那此是第一無盡功德有大果報得大稱讚名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有善男子善女人發大信心於彼林中建立精舍令衆僧安止尊那此是第二無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有善男子善女人發大信心於彼衆僧精舍之內布施坐臥之具所謂床椅氈褥衣被種種受用之物尊那此是第三無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人發至誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有善男子善女人發大信心於彼精舍之內能布施財穀供養衆僧尊那此是第四無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人發至誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有善男子善女人發大信心能於往來衆僧常行布施所須之物尊那此是第五無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人發志誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有善男子善女人發大信心於病苦者能行布施及看病者亦行布施尊那此是第六無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人發至誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有善男子善女人發大信心或見霜雪嚴凝風雨寒冷而見是已便能修撰種種飲食湯藥臥具衣物鞋履等於衆僧中供給供養如是衆僧風雨不侵不受寒冷承是供養得大安樂尊那此是第七無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人發志誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量尊那如是七種無盡功德法若有善男子善女人發至誠心具足此法所獲無盡功德不可思議不可稱量功德甚多名大功德蘊尊那譬如五大河恆流其水所謂殑伽河閻母那河薩囉喻河愛囉嚩帝河末呬河而此河水不可限量如是河水乃至盛水之器百數千數百千億數其水甚多名為水蘊無盡功德亦復如是尊那此七種無盡功德法悉皆具足是善男子善女人所獲功德不可思議不可稱量具大名聞及大果報功德甚多名為大功德蘊爾時大尊者尊那復白佛言世尊此無盡功德若人具足此法真實不虛獲大果報具大稱讚名聞普遍甚深廣大佛告大尊者尊那言如汝所説實獲此無盡功德果報如是佛言尊那復有七種無盡功德法有大果報具大稱讚名聞普遍甚深廣大若善男子善女人發至誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量何等為七尊那若有淨信善男子善女人聽聞如來或聞聲聞衆在彼聚落或在城隍經行遊止聞如是已生大歡喜起大善意發菩提心尊那此是第一無盡功德法有大果報具大稱讚名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有淨信善男子善女人聽聞如來及聲聞衆或往聚落或詣城隍聞如是已生大歡喜起大善意發菩提心尊那此是第二無盡功德法有大果報乃至名聞普遍甚深廣大若淨信善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有淨信善男子善女人聽聞如來或聲聞衆在於路次聞如是已生大歡喜起大善意發菩提心尊那此是第三無盡功德法有大果報乃至名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有淨信善男子善女人聽聞如來或聞聲聞衆到於聚落或到城隍聞如是已生大歡喜起大善意發菩提心尊那此是第四無盡功德法有大果報乃至名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有淨信善男子善女人聽聞如來及聞聲聞衆或於聚落或在城隍自往親近禮拜瞻仰獲瞻仰已生大歡喜起大善意發菩提心尊那此是第五無盡功德法有大果報乃至名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有淨信善男子善女人到於佛所或至聲聞所禮拜瞻仰聽聞妙法聞是法已生大歡喜起大善意發菩提心尊那此是第六無盡功德有大果報乃至名聞普遍甚深廣大若善男子善女人能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量復次尊那若有淨信善男子善女人於如來所或聲聞所聞是法已起大善意歸佛法僧歸三寶已乃至受於如來清淨戒法尊那此是第七無盡功德法有大果報乃至名聞普遍甚深廣大尊那若善男子善女人發至誠心能具足此法是人於四威儀中恆得增長無盡功德所增功德不可思議不可稱量尊那如是七種無盡功德法若有善男子善女人能具足此法所獲功德不可限量尊那此七種無盡功德法若有善男子善女人發至誠心能具足此法所獲無盡功德不可限量如是功德名聞稱讚及大果報功德甚多名為大功德蘊復次尊那譬如有五大河恆流其水所謂殑伽河閻母那河薩囉喻河愛囉嚩帝河末呬河而此河水不可限量如是河水乃至盛水之器百數千數百千億數其水甚多名為水蘊無盡功德亦復如是尊那此七種無盡功德法悉皆具足是善男子善女人所獲功德不可思議不可稱量具大名聞及大果報功德甚多名為大功德蘊爾時世尊而説頌曰清淨修禪行唯修聖迹中採寶無過海如河濟有情河水無邊際衆流還復源布施獲多福如河常流海爾時大尊者尊那聞佛説已歡喜作禮信受奉行
